groups:
  - name: infrastructure
    rules:
      # Dead man's switch - ensures alerting pipeline is working
      - alert: DeadMansSwitch
        expr: vector(1)
        for: 5m
        labels:
          severity: none
        annotations:
          summary: "Dead man's switch"
          description: "This alert fires continuously to ensure the alerting pipeline is functional."

      # Prometheus self-monitoring
      - alert: PrometheusTargetMissing
        expr: up == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus target {{ $labels.job }} is down"
          description: "{{ $labels.job }} ({{ $labels.instance }}) has been unreachable for 5 minutes."

      # PostgreSQL alerts
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance has been down for more than 1 minute."

      - alert: PostgreSQLHighConnections
        expr: pg_stat_database_numbackends > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL high connection count"
          description: "PostgreSQL has {{ $value }} active connections (threshold: 80)."

      - alert: PostgreSQLSlowQueries
        expr: pg_stat_activity_idle_in_transaction > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL idle-in-transaction connections detected"
          description: "PostgreSQL has {{ $value }} idle-in-transaction connections, which may indicate slow or abandoned transactions."

      - alert: PostgreSQLHighDeadlocks
        expr: rate(pg_stat_database_deadlocks{datname="enclavr"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL deadlocks detected"
          description: "PostgreSQL is experiencing deadlocks at {{ $value }}/sec."

      - alert: PostgreSQLDiskSpaceLow
        expr: pg_database_size_size_bytes / 1024 / 1024 / 1024 > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL database size exceeds 10GB"
          description: "Database size is {{ $value | humanize }}B."

      # Redis alerts
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis instance has been down for more than 1 minute."

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis high memory usage"
          description: "Redis memory usage is at {{ $value | humanizePercentage }}."

      - alert: RedisHighEvictionRate
        expr: rate(redis_evicted_keys_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis high key eviction rate"
          description: "Redis is evicting {{ $value }} keys/sec."

      - alert: RedisHighConnectedClients
        expr: redis_connected_clients > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis high connected clients"
          description: "Redis has {{ $value }} connected clients (threshold: 500)."

      - alert: RedisRejectedConnections
        expr: rate(redis_rejected_connections_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Redis rejecting connections"
          description: "Redis is rejecting connections at {{ $value }}/sec."

      - alert: RedisSlowlogGrowing
        expr: redis_slowlog_length > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis slowlog growing"
          description: "Redis slowlog has {{ $value }} entries, indicating slow commands."

      - alert: RedisHighCpuUsage
        expr: rate(redis_cpu_sys_seconds_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis high CPU usage"
          description: "Redis is consuming {{ $value }} CPU cores."

      # MinIO alerts
      - alert: MinIODown
        expr: up{job="minio"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MinIO is down"
          description: "MinIO object storage has been unreachable for more than 2 minutes."

      - alert: MinIODiskSpaceLow
        expr: minio_cluster_disk_free_bytes / minio_cluster_disk_total_bytes < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MinIO disk space low"
          description: "MinIO has less than 10% disk space remaining."

      - alert: MinIOHighErrorRate
        expr: rate(minio_s3_requests_total{code=~"5.."}[5m]) / rate(minio_s3_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MinIO high error rate"
          description: "MinIO S3 error rate is above 5%."

      # Node Exporter alerts
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for more than 10 minutes (current: {{ $value }}%)."

      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 85% (current: {{ $value }}%)."

      - alert: DiskSpaceLow
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space running low"
          description: "Disk usage on / is above 85% (current: {{ $value }}%)."

      - alert: DiskSpaceCritical
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 95
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critically low"
          description: "Disk usage on / is above 95% (current: {{ $value }}%)."

      # Service health alerts
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} ({{ $labels.instance }}) has been down for more than 2 minutes."

  - name: application
    rules:
      # Server alerts
      - alert: ServerHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Server high request latency"
          description: "95th percentile request latency is above 1 second."

      - alert: ServerHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Server high error rate"
          description: "Server error rate is above 5% (current: {{ $value | humanizePercentage }})."

      - alert: ServerHighMemoryUsage
        expr: process_resident_memory_bytes{job="server"} / 1024 / 1024 > 400
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Server high memory usage"
          description: "Server process is using {{ $value | humanize }}B of memory."

      - alert: ServerHighGoroutines
        expr: go_goroutines{job="server"} > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Server high goroutine count"
          description: "Server has {{ $value }} goroutines, possible goroutine leak."
