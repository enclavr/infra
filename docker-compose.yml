services:
  # ============================================
  # PostgreSQL Database (Primary Data Store)
  # ============================================
  # Uses PostgreSQL 18.3 Alpine for small footprint
  # PGDATA path updated for PostgreSQL 18 compatibility
  postgres:
    image: postgres:18.3-alpine
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enclavr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-enclavr}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-enclavr}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    labels:
      logging: "alloy"
      backup: "postgres"
      com.centurylinklabs.watchtower.enable: "true"
    # Security: postgres image runs as non-root by default
    # Resource limits for production stability
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    networks:
      backend:
        aliases:
          - db
      monitoring:

  # ============================================
  # Redis Cache & Pub/Sub (Real-time Messaging)
  # ============================================
  # Redis 8 provides 2x throughput and 87% faster commands
  # Used for WebSocket pub/sub across multiple server instances
  redis:
    image: redis:8-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server /etc/redis/redis.conf --requirepass \"$$REDIS_PASSWORD\";
      else
        redis-server /etc/redis/redis.conf;
      fi"
    volumes:
      - redis_data:/data
      - ./redis.conf:/etc/redis/redis.conf:ro
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s
    labels:
      logging: "alloy"
    # Security: redis image runs as non-root by default
    # Resource limits for Redis 8 (performance optimized)
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    networks:
      backend:
        aliases:
          - cache

  # ============================================
  # Go Backend API Server
  # ============================================
  # Multi-stage build: golang builder -> alpine runtime
  # Runs as non-root user (UID 1000) for security
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SERVER_READ_TIMEOUT: ${SERVER_READ_TIMEOUT:-30s}
      SERVER_WRITE_TIMEOUT: ${SERVER_WRITE_TIMEOUT:-30s}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-enclavr}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-enclavr}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      REFRESH_EXPIRATION: ${REFRESH_EXPIRATION:-168h}
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      STUN_SERVER: ${STUN_SERVER:-stun:stun.l.google.com:19302}
      TURN_SERVER: ${TURN_SERVER:-}
      TURN_USER: ${TURN_USER:-}
      TURN_PASS: ${TURN_PASS:-}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_DB: ${REDIS_DB:-0}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@enclavr.local}
      FIRST_USER_IS_ADMIN: ${FIRST_USER_IS_ADMIN:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    stop_grace_period: 15s
    init: true
    # Health check for server API
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Security: run as non-root user
    user: "1000:1000"
    volumes:
      - server_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      logging: "alloy"
    # Resource limits for production stability
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
        reservations:
          memory: 256M
          cpus: '0.5'
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend
      - backend
      - monitoring

  # ============================================
  # Next.js Frontend (Static Build + Nginx)
  # ============================================
  # Multi-stage build: Bun builder -> Nginx static server
  # Serves built static files on port 80
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_STUN_SERVER: ${NEXT_PUBLIC_STUN_SERVER:-stun:stun.l.google.com:19302}
        NEXT_PUBLIC_TURN_SERVER: ${NEXT_PUBLIC_TURN_SERVER:-}
        NEXT_PUBLIC_TURN_USER: ${NEXT_PUBLIC_TURN_USER:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-production}
    # Port mapping defined in docker-compose.override.yml for dev
    # Production: use docker-compose.prod.yml with 127.0.0.1:3000:80
    restart: unless-stopped
    stop_grace_period: 10s
    init: true
    depends_on:
      server:
        condition: service_healthy
    labels:
      logging: "alloy"
    # Health check for frontend (nginx serves on port 80)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    # Resource limits for production stability
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /var/cache/nginx:size=64M
      - /var/run:size=16M
    networks:
      - frontend

  # ============================================
  # Coturn TURN Server (WebRTC Relay)
  # ============================================
  # TURN server for NAT traversal in restrictive networks
  # Required for reliable voice/video when STUN alone isn't sufficient
  coturn:
    image: coturn/coturn:4.9.0-alpine
    profiles:
      - voice
      - full
    environment:
      - TURN_USER=${TURN_USER}
      - TURN_PASS=${TURN_PASS}
      - REALM=${REALM:-enclavr}
    ports:
      - "127.0.0.1:3478:3478"
      - "127.0.0.1:3478:3478/udp"
      - "49152-49172:49152-49172/udp"
    volumes:
      - turn_data:/var/lib/coturn
    restart: unless-stopped
    command: >
      sh -c "turnserver -n --no-stdout-log --log-file=stdout
      --user=$${TURN_USER}:$${TURN_PASS}
      --realm=$${REALM:-enclavr} --listening-port=3478
      --min-port=49152 --max-port=49172
      --prometheus --prometheus-addr=0.0.0.0 --prometheus-port=9641
      --lt-cred-mech --no-tls --no-tlsv1 --no-tlsv1_1"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3478"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    labels:
      logging: "alloy"
    # Resource limits for TURN server (UDP bandwidth can be high)
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1'
        reservations:
          memory: 128M
          cpus: '0.5'
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend
      - monitoring

  # ============================================
  # Prometheus (Metrics Collection)
  # ============================================
  # Time-series database for collecting metrics
  prometheus:
    image: prom/prometheus:v3.10.0-alpine
    container_name: prometheus
    profiles:
      - monitoring
      - full
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    restart: unless-stopped
    init: true
    stop_grace_period: 10s
    depends_on:
      node-exporter:
        condition: service_healthy
      postgres-exporter:
        condition: service_healthy
      redis-exporter:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    networks:
      monitoring:
        aliases:
          - prom

  # ============================================
  # Node Exporter (System Metrics)
  # ============================================
  # Exports system-level metrics (CPU, memory, disk, network)
  node-exporter:
    image: prom/node-exporter:v1.8.0-alpine
    container_name: node-exporter
    profiles:
      - monitoring
      - full
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    networks:
      - monitoring

  # ============================================
  # PostgreSQL Exporter (Database Metrics)
  # ============================================
  # Exports PostgreSQL query statistics and metrics
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0-alpine
    container_name: postgres-exporter
    profiles:
      - monitoring
      - full
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-enclavr}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/${DB_NAME:-enclavr}?sslmode=disable"
    volumes:
      - ./queries.yaml:/opt/postgres_exporter/queries.yaml:ro
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
      - monitoring

  # ============================================
  # Redis Exporter (Cache Metrics)
  # ============================================
  # Exports Redis performance and memory metrics
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0-alpine
    container_name: redis-exporter
    profiles:
      - monitoring
      - full
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
      - monitoring

  # ============================================
  # Grafana (Metrics & Logs Visualization)
  # ============================================
  # Visualize metrics from Prometheus and logs from Loki
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    profiles:
      - monitoring
      - full
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD}"
      GF_INSTALL_PLUGINS: ""
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "${GRAFANA_SERVE_FROM_SUB_PATH:-false}"
    ports:
      - "127.0.0.1:3030:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    networks:
      monitoring:
        aliases:
          - dashboard

  # ============================================
  # Alertmanager (Alert Routing & Notifications)
  # ============================================
  # Routes Prometheus alerts to notification channels
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: alertmanager
    profiles:
      - monitoring
      - full
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - alertmanager_data:/alertmanager
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16M,mode=1777
    networks:
      - monitoring

  # ============================================
  # Loki (Log Aggregation)
  # ============================================
  # Lightweight log aggregation system by Grafana Labs
  # Label-based indexing without full-text indexing for low resource usage
  loki:
    image: grafana/loki:3.6.8
    container_name: loki
    profiles:
      - monitoring
      - full
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    networks:
      monitoring:
        aliases:
          - logs

  # ============================================
  # Grafana Alloy (Log Collection Agent)
  # ============================================
  # Replaces deprecated Promtail - collects Docker container logs
  # and forwards them to Loki for aggregation
  alloy:
    image: grafana/alloy:v1.7.4
    container_name: alloy
    profiles:
      - monitoring
      - full
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:12345/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - monitoring

  # ============================================
  # Docker Socket Proxy (Secure Docker API Access)
  # ============================================
  # Provides restricted read-only access to Docker API for Alloy
  # Only allows container listing and log reading - no privileged operations
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.1.2
    container_name: docker-socket-proxy
    profiles:
      - monitoring
      - full
    environment:
      CONTAINERS: 1
      SERVICES: 0
      TASKS: 0
      NETWORKS: 0
      VOLUMES: 0
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2375/_ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16M,mode=1777
    networks:
      - monitoring

  # ============================================
  # PostgreSQL Backup (Automated Database Backups)
  # ============================================
  # Runs pg_dumpall on a schedule, compresses and rotates backups
  # Configure BACKUP_RETENTION_DAYS (default: 7) and BACKUP_CRON
  postgres-backup:
    build:
      context: .
      dockerfile: Dockerfile.postgres-backup
    container_name: postgres-backup
    profiles:
      - backup
      - full
    command:
      - |
        echo "Backup service started. Schedule: $${BACKUP_CRON:-0 2 * * *}"
        echo "$${BACKUP_CRON:-0 2 * * *} /backup.sh 2>&1" > /tmp/crontab
        supercronic /tmp/crontab
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-enclavr}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_CRON: ${BACKUP_CRON:-0 2 * * *}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - backup_data:/backups
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h postgres -U ${POSTGRES_USER:-enclavr} || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

  # ============================================
  # Caddy Reverse Proxy (TLS Termination)
  # ============================================
  # Automatic HTTPS with Let's Encrypt
  # Use --profile tls to enable
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    profiles:
      - tls
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend
      - monitoring

  # ============================================
  # Watchtower (Automated Container Updates)
  # ============================================
  # Monitors running containers and updates when new images are available
  # Only updates containers with com.centurylinklabs.watchtower.enable=true label
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    profiles:
      - maintenance
      - full
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_POLL_INTERVAL: "${WATCHTOWER_POLL_INTERVAL:-86400}"
      WATCHTOWER_LOG_LEVEL: "${WATCHTOWER_LOG_LEVEL:-info}"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_TIMEOUT: "30s"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "watchtower"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16M,mode=1777
    networks:
      - monitoring

volumes:
  postgres_data:
    driver: local
    labels:
      com.enclavr.backup: "true"
      com.enclavr.description: "PostgreSQL primary database"
  redis_data:
    driver: local
    labels:
      com.enclavr.backup: "false"
      com.enclavr.description: "Redis cache and pub/sub data"
  turn_data:
    driver: local
    labels:
      com.enclavr.backup: "false"
      com.enclavr.description: "Coturn TURN server data"
  server_uploads:
    driver: local
    labels:
      com.enclavr.backup: "true"
      com.enclavr.description: "Server file uploads"
  prometheus_data:
    driver: local
    labels:
      com.enclavr.backup: "false"
      com.enclavr.description: "Prometheus metrics data"
  grafana_data:
    driver: local
    labels:
      com.enclavr.backup: "true"
      com.enclavr.description: "Grafana dashboards and settings"
  loki_data:
    driver: local
    labels:
      com.enclavr.backup: "false"
      com.enclavr.description: "Loki log data"
  alertmanager_data:
    driver: local
    labels:
      com.enclavr.backup: "false"
      com.enclavr.description: "Alertmanager data"
  backup_data:
    driver: local
    labels:
      com.enclavr.backup: "true"
      com.enclavr.description: "PostgreSQL backup archives"
  caddy_data:
    driver: local
    labels:
      com.enclavr.backup: "false"
      com.enclavr.description: "Caddy TLS certificates and data"
  caddy_config:
    driver: local
    labels:
      com.enclavr.backup: "false"
      com.enclavr.description: "Caddy configuration cache"

networks:
  frontend:
    name: enclavr_frontend
    driver: bridge
    labels:
      com.enclavr.network: "frontend"
      com.enclavr.description: "External-facing network for frontend and coturn"
  backend:
    name: enclavr_backend
    driver: bridge
    internal: true
    labels:
      com.enclavr.network: "backend"
      com.enclavr.description: "Internal network for database and cache services"
  monitoring:
    name: enclavr_monitoring
    driver: bridge
    internal: true
    labels:
      com.enclavr.network: "monitoring"
      com.enclavr.description: "Internal network for monitoring and logging stack"
