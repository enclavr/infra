# Development overrides for docker-compose.yml
# This file is automatically loaded by Docker Compose
# Use: docker compose up -d (automatically picks up override)

services:
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
      target: builder
    volumes:
      - ../server:/app
      - server_go_cache:/go/pkg/mod
    environment:
      SERVER_PORT: 8080
      DB_SSLMODE: disable
      SENTRY_DSN: ""
      SENTRY_ENVIRONMENT: development
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:2345:2345"  # Delve debugger
    command: ["go", "run", "./cmd/server"]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: builder
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      NODE_ENV: development
    command: ["bun", "run", "dev"]

  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  server_go_cache:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_next:
    driver: local
