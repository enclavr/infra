name: Bug Report
description: Report a bug with the Enclavr infrastructure configuration
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Clone the repository
        2. Copy `.env.example` to `.env`
        3. Run `docker compose up -d`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: docker-version
    attributes:
      label: Docker Version
      description: Output of `docker --version`
      placeholder: "Docker version 27.x.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Your operating system and version.
      placeholder: "Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: docker-compose-logs
    attributes:
      label: Docker Compose Logs
      description: Paste relevant output from `docker compose logs`.
      render: shell
    validations:
      required: false
