services:
  # ============================================
  # PostgreSQL Database (Primary Data Store)
  # ============================================
  # Uses PostgreSQL 18.3 Alpine for small footprint
  # PGDATA path updated for PostgreSQL 18 compatibility
  postgres:
    image: postgres:18.3-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enclavr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-enclavr}
      POSTGRES_DB: ${POSTGRES_DB:-enclavr}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-enclavr}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    # Security: postgres image runs as non-root by default
    # Resource limits for production stability
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============================================
  # Redis Cache & Pub/Sub (Real-time Messaging)
  # ============================================
  # Redis 8 provides 2x throughput and 87% faster commands
  # Used for WebSocket pub/sub across multiple server instances
  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s
    # Security: redis image runs as non-root by default
    # Resource limits for Redis 8 (performance optimized)
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ============================================
  # Go Backend API Server
  # ============================================
  # Multi-stage build: golang builder → alpine runtime
  # Runs as non-root user (UID 1000) for security
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SERVER_READ_TIMEOUT: ${SERVER_READ_TIMEOUT:-30s}
      SERVER_WRITE_TIMEOUT: ${SERVER_WRITE_TIMEOUT:-30s}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-enclavr}
      DB_PASSWORD: ${DB_PASSWORD:-enclavr}
      DB_NAME: ${DB_NAME:-enclavr}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      REFRESH_EXPIRATION: ${REFRESH_EXPIRATION:-168h}
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      STUN_SERVER: ${STUN_SERVER:-stun:stun.l.google.com:19302}
      TURN_SERVER: ${TURN_SERVER:-}
      TURN_USER: ${TURN_USER:-}
      TURN_PASS: ${TURN_PASS:-}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    ports:
      - "8080:8080"
    restart: unless-stopped
    # Security: run as non-root user
    user: "1000:1000"
    volumes:
      - server_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Resource limits for production stability
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
        reservations:
          memory: 256M
          cpus: '0.5'

  # ============================================
  # Next.js Frontend (Static Build + Nginx)
  # ============================================
  # Multi-stage build: Bun builder → Nginx static server
  # Serves built static files on port 80
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_STUN_SERVER: ${NEXT_PUBLIC_STUN_SERVER:-stun:stun.l.google.com:19302}
        NEXT_PUBLIC_TURN_SERVER: ${NEXT_PUBLIC_TURN_SERVER:-}
        NEXT_PUBLIC_TURN_USER: ${NEXT_PUBLIC_TURN_USER:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-production}
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - server
    # Health check for frontend (nginx serves static files)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || wget -qO- http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    # Resource limits for production stability
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ============================================
  # Coturn TURN Server (WebRTC Relay)
  # ============================================
  # TURN server for NAT traversal in restrictive networks
  # Required for reliable voice/video when STUN alone isn't sufficient
  coturn:
    image: coturn/coturn:4.9.0-alpine
    environment:
      - TURN_USER=${TURN_USER:-enclavr}
      - TURN_PASS=${TURN_PASS:-enclavr}
      - REALM=${REALM:-enclavr}
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49152-49172:49152-49172"
      - "49152-49172:49152-49172/udp"
    volumes:
      - turn_data:/var/lib/coturn
    restart: unless-stopped
    command: >
      turnserver -n --no-stdout-log --log-file=stdout
      --user=${TURN_USER:-enclavr}:${TURN_PASS:-enclavr}
      --realm=${REALM:-enclavr} --listening-port=3478
      --min-port=49152 --max-port=49172
      --lt-cred-mech --no-tls --no-tlsv1 --no-tlsv1_1
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3478"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    # Resource limits for TURN server (UDP bandwidth can be high)
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1'
        reservations:
          memory: 128M
          cpus: '0.5'

  # ============================================
  # Prometheus (Metrics Collection)
  # ============================================
  # Time-series database for collecting metrics
  prometheus:
    image: prom/prometheus:v2.54.0-alpine
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    depends_on:
      - node-exporter
      - postgres-exporter
      - redis-exporter
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============================================
  # Node Exporter (System Metrics)
  # ============================================
  # Exports system-level metrics (CPU, memory, disk, network)
  node-exporter:
    image: prom/node-exporter:v1.8.0-alpine
    container_name: node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ============================================
  # PostgreSQL Exporter (Database Metrics)
  # ============================================
  # Exports PostgreSQL query statistics and metrics
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0-alpine
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-enclavr}:${DB_PASSWORD:-enclavr}@postgres:5432/${DB_NAME:-enclavr}?sslmode=disable"
    ports:
      - "9187:9187"
    volumes:
      - ./queries.yaml:/opt/postgres_exporter/queries.yaml:ro
    restart: unless-stopped
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ============================================
  # Redis Exporter (Cache Metrics)
  # ============================================
  # Exports Redis performance and memory metrics
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0-alpine
    container_name: redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    ports:
      - "9121:9121"
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ============================================
  # Grafana (Metrics Visualization)
  # ============================================
  # Visualize metrics from Prometheus with dashboards
  grafana:
    image: grafana/grafana:11.2.0-alpine
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "${GRAFANA_SERVE_FROM_SUB_PATH:-false}"
    ports:
      - "3030:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  turn_data:
    driver: local
  server_uploads:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: infra_default